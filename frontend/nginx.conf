server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any path that isn't a real file so
    # client-side routes (e.g. /orders/5) work on direct load / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets aggressively; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
