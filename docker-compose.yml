# One `docker compose up` brings up db -> backend (after migrations) -> frontend.
# All configuration comes from the root .env (copy from .env.example).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Backend waits on this so it never runs migrations against a db that
      # isn't accepting connections yet.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: hixmanshu00/inventory-management-api:latest
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD}
      SEED_ON_START: ${SEED_ON_START}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:8000"
    restart: unless-stopped

  frontend:
    image: hixmanshu00/inventory-frontend:latest
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time; must be the URL the user's
        # browser can reach the backend at (the host-exposed port).
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

volumes:
  pgdata:
