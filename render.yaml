# Render Blueprint — backend API + database only.
# The frontend is deployed separately on Vercel (root dir: frontend).
# Deploy: Render Dashboard > New > Blueprint > select this repo.
#
# After the first deploy, set CORS_ORIGINS on the service to your Vercel URL.

services:
  - type: web
    name: inventory-management-api
    runtime: docker
    # Build context is backend/ so the Dockerfile's COPY paths resolve and the
    # entrypoint runs `alembic upgrade head` before serving.
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      # Provisioned below. The app normalizes the bare postgresql:// scheme to
      # postgresql+psycopg:// automatically (see backend/app/config.py).
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-management-db
          property: connectionString
      # Comma-separated allowed origins — set to your Vercel domain,
      # e.g. https://inventory-management.vercel.app
      - key: CORS_ORIGINS
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: 10
      # Seed a few products/customers on first boot so the demo isn't empty.
      - key: SEED_ON_START
        value: true

databases:
  - name: inventory-management-db
    databaseName: inventory
    user: inventory
    plan: free
